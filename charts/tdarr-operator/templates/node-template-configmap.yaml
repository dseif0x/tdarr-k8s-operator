{{/*
The full node Job manifest. The controller loads this from the mounted
ConfigMap and applies it (overriding name/namespace) whenever the Tdarr server
has work queued. All GPU/scheduling customisation lives here.
*/}}
{{- define "tdarr-operator.nodeJob" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tdarr-operator.nodeJobName" . }}
  labels:
    {{- include "tdarr-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
    {{- with .Values.node.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.node.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.node.backoffLimit }}
  {{- if gt (int .Values.node.activeDeadlineSeconds) 0 }}
  activeDeadlineSeconds: {{ .Values.node.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "tdarr-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node
        {{- with .Values.node.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.node.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.node.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tdarr-node
          image: "{{ .Values.node.image.repository }}:{{ .Values.node.image.tag }}"
          imagePullPolicy: {{ .Values.node.image.pullPolicy }}
          {{- with .Values.node.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: serverIP
              value: {{ include "tdarr-operator.serverName" . | quote }}
            - name: serverPort
              value: {{ .Values.server.serverPort | quote }}
            - name: nodeName
              value: {{ .Values.node.name | quote }}
            {{- range $k, $v := .Values.node.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- with .Values.node.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "tdarr-operator.sharedVolumeMounts" . | nindent 12 }}
          {{- with .Values.node.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- include "tdarr-operator.sharedVolumes" . | nindent 8 }}
      {{- with .Values.node.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.node.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tdarr-operator.nodeTemplateConfigMap" . }}
  labels:
    {{- include "tdarr-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
data:
  node-job.yaml: |
    {{- include "tdarr-operator.nodeJob" . | nindent 4 }}
