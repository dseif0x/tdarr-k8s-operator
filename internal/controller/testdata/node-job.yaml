apiVersion: batch/v1
kind: Job
metadata:
  name: rel-tdarr-operator-node
  labels:
    helm.sh/chart: tdarr-operator-0.1.0
    app.kubernetes.io/name: tdarr-operator
    app.kubernetes.io/instance: rel
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: node
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tdarr-operator
        app.kubernetes.io/instance: rel
        app.kubernetes.io/component: node
    spec:
      restartPolicy: OnFailure
      runtimeClassName: nvidia
      containers:
        - name: tdarr-node
          image: "ghcr.io/haveagitgat/tdarr_node:2.45.01"
          imagePullPolicy: IfNotPresent
          env:
            - name: serverIP
              value: "rel-tdarr-operator-server"
            - name: serverPort
              value: "8266"
            - name: nodeName
              value: "k8s-gpu-node"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: "UTC"
            - name: inContainer
              value: "true"
          volumeMounts:
            
            - name: media
              mountPath: /media
            - name: cache
              mountPath: /temp
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        
        - name: media
          persistentVolumeClaim:
            claimName: media-rwx
        - name: cache
          persistentVolumeClaim:
            claimName: transcode-cache-rwx
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
